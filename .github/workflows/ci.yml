name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go-test:
    name: go unit + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            pkg/go.sum
            services/ingestion/go.sum
            services/query/go.sum
            tests/stress/go.sum
      - name: go vet
        run: go vet ./pkg/... ./services/ingestion/... ./services/query/... ./tests/stress/...
      - name: go build (all services)
        run: make build
      - name: go test (race + coverage)
        run: |
          go test -race -count=1 -covermode=atomic -coverprofile=coverage.out \
            ./pkg/... ./services/ingestion/... ./services/query/... ./tests/stress/...
          go tool cover -func=coverage.out | tail -n 1
      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  java-test:
    name: flink aggregator (maven)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: services/flink-aggregator } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: mvn verify (compile + test + shade)
        run: mvn -B -ntp verify
      - uses: actions/upload-artifact@v4
        with:
          name: flink-aggregator-jar
          path: services/flink-aggregator/target/flink-aggregator-*.jar
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: services/flink-aggregator/target/surefire-reports/

  compose-validate:
    name: docker-compose schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose --env-file .env.example -f deployments/docker-compose.yml config --quiet

  smoke:
    name: end-to-end smoke (ingestion + query)
    runs-on: ubuntu-latest
    needs: [go-test, compose-validate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: |
            pkg/go.sum
            services/ingestion/go.sum
            services/query/go.sum
            tests/stress/go.sum
      - name: bring up kafka + clickhouse only
        run: |
          docker compose --env-file .env.example -f deployments/docker-compose.yml \
            up -d --wait kafka clickhouse
      # Kafka advertises PLAINTEXT://kafka:9092 to clients. A client that
      # bootstraps against localhost:9092 still receives "kafka:9092" in
      # the broker metadata, so producing fails with a DNS error on the
      # runner. Map the hostname to loopback so advertised listeners
      # resolve without changing the production compose config.
      - name: map kafka hostname to localhost
        run: echo "127.0.0.1 kafka" | sudo tee -a /etc/hosts
      # Pre-build so the port is listening quickly. `go run` would block on
      # module downloads + compile (~30s) and the previous `sleep 3` raced
      # the download, giving curl "connection refused".
      - name: build ingestion + query
        run: make build
      - name: run ingestion + query natively
        env:
          KAFKA_BROKERS: "localhost:9092"
          CLICKHOUSE_ADDRS: "localhost:9000"
        run: |
          set -e
          ./bin/ingestion >/tmp/ingestion.log 2>&1 &
          INGEST_PID=$!
          ./bin/query     >/tmp/query.log     2>&1 &
          QUERY_PID=$!
          trap 'kill $INGEST_PID $QUERY_PID 2>/dev/null || true' EXIT

          # Poll until both ports are accepting connections. Fail loudly
          # after 30s instead of sending curl at a dead port.
          wait_http () {
            local url=$1
            for i in $(seq 1 60); do
              curl -fsS -o /dev/null "$url" && return 0
              sleep 0.5
            done
            echo "timeout waiting for $url" >&2
            return 1
          }
          wait_http http://localhost:8080/healthz
          wait_http http://localhost:8081/healthz

          curl -fsS -X POST http://localhost:8080/api/v1/heartbeat \
            -H 'Content-Type: application/json' \
            -d '{"device_id":"ci","region":"us","status":"ok","timestamp_ms":'$(date +%s%3N)',"latency_ms":1.0}'
          curl -fsS http://localhost:8081/healthz
      - name: dump service logs on failure
        if: failure()
        run: |
          echo '=== ingestion ==='; cat /tmp/ingestion.log || true
          echo '=== query ==='    ; cat /tmp/query.log     || true
      - name: dump logs on failure
        if: failure()
        run: docker compose --env-file .env.example -f deployments/docker-compose.yml logs --tail=200
      - name: teardown
        if: always()
        run: docker compose --env-file .env.example -f deployments/docker-compose.yml down -v
